<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ULM Oefenexamen (BE) – Examentool</title>
  <style>
    :root { --ok:#1a7f37; --bad:#b42318; --muted:#667085; --bg:#0b1020; --card:#11182b; --line:#25304a; --txt:#e6e9f2; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: radial-gradient(1200px 600px at 20% 0%, #1a2450 0%, var(--bg) 60%); color: var(--txt); }
    header { padding: 22px 18px 10px; max-width: 980px; margin: 0 auto; }
    h1 { font-size: 20px; margin: 0 0 6px; }
    p.sub { margin:0; color: var(--muted); font-size: 13px; }
    main { max-width: 980px; margin: 0 auto; padding: 12px 18px 28px; }
    .card { background: rgba(17,24,43,.9); border: 1px solid rgba(37,48,74,.9); border-radius: 14px; padding: 14px; box-shadow: 0 12px 40px rgba(0,0,0,.25); }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:end; }
    label { font-size: 12px; color: var(--muted); display:block; margin-bottom: 6px; }
    select, input[type="number"] {
      background:#0f1526; border:1px solid var(--line); color:var(--txt);
      border-radius: 10px; padding: 10px 10px; font-size: 14px; outline:none;
    }
    input[type="number"] { width: 90px; }
    button {
      background: #2b5cff; border:1px solid rgba(255,255,255,.08); color:white;
      border-radius: 12px; padding: 10px 14px; font-weight: 650; cursor:pointer;
    }
    button.secondary { background: transparent; border:1px solid var(--line); color: var(--txt); }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .meta { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top: 10px; color: var(--muted); font-size: 13px; }
    .pill { border:1px solid var(--line); background: rgba(15,21,38,.65); border-radius: 999px; padding: 6px 10px; }
    .qwrap { margin-top: 14px; }
    .qcard { border:1px solid var(--line); border-radius: 14px; padding: 12px; margin: 10px 0; background: rgba(15,21,38,.55); }
    .qhead { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .qtitle { font-weight: 700; }
    .qtext { margin: 8px 0 10px; }
    .answers { display:grid; gap:8px; }
    .ans {
      display:flex; gap:10px; align-items:flex-start;
      border:1px solid rgba(37,48,74,.75); border-radius: 12px; padding: 10px;
      background: rgba(10,15,30,.35);
    }
    .ans input { margin-top: 3px; }
    .footer { display:flex; gap:10px; flex-wrap:wrap; margin-top: 12px; }
    .result { margin-top: 14px; border-radius: 14px; padding: 12px; border: 1px solid var(--line); background: rgba(15,21,38,.55); }
    .ok { color: #a6f4c5; }
    .bad { color: #fda29b; }
    details { margin-top: 8px; }
    summary { cursor:pointer; color: var(--muted); }
    .small { color: var(--muted); font-size: 12px; }
    .hr { height:1px; background: rgba(37,48,74,.8); margin: 12px 0; }
    .tag { font-size: 12px; color: var(--muted); }
    .explain { margin-top: 8px; font-size: 13px; color: #cbd5ff; }
  </style>
</head>
<body>
  <header>
    <h1>ULM Oefenexamen (België) – Examentool</h1>
    <p class="sub">20 vragen per sessie • willekeurige selectie • score op /10 • geslaagd vanaf 7/10</p>
  </header>

  <main>
    <div class="card">
      <div class="row">
        <div style="min-width:240px; flex:1;">
          <label for="subject">Vak</label>
          <select id="subject"></select>
        </div>

        <div>
          <label for="numQuestions">Aantal vragen</label>
          <input id="numQuestions" type="number" min="5" max="40" value="20" />
        </div>

        <div>
          <label for="seedMode">Randomisatie</label>
          <select id="seedMode">
            <option value="true" selected>Elke sessie anders</option>
            <option value="false">Herhaalbaar (zelfde seed)</option>
          </select>
        </div>

        <div>
          <label>&nbsp;</label>
          <button id="startBtn">Start oefening</button>
        </div>
      </div>

      <div class="meta">
        <div class="pill" id="bankInfo">Vragenbank: —</div>
        <div class="pill">Doel: <b>≥ 7/10</b> bij 20 vragen</div>
        <div class="pill small">Tip: voeg je eigen vragen toe in de code (questionBanks).</div>
      </div>

      <div class="hr"></div>

      <div id="quizArea" class="qwrap" style="display:none;"></div>

      <div class="footer" id="quizActions" style="display:none;">
        <button id="submitBtn" class="secondary">Indienen & score</button>
        <button id="newSetBtn">Nieuwe set (zelfde vak)</button>
        <button id="resetBtn" class="secondary">Reset</button>
      </div>

      <div id="resultArea" class="result" style="display:none;"></div>
    </div>
  </main>

  <script>
    /*************************************************************
     * 1) VRAGENBANKEN
     * Voeg/maak vragen bij door objecten toe te voegen.
     * - q: vraag
     * - options: array van antwoordopties
     * - correctIndex: index (0..n-1) van juiste optie
     * - explain: (optioneel) korte uitleg
     *************************************************************/
    const questionBanks = {
      "Menselijke prestaties & beperkingen": [
        {
          q: "Wat is een typisch effect van hyperventilatie?",
          options: ["Betere nachtzicht", "Duizeligheid en tintelingen", "Snellere dehydratie door zweten", "Langzamere hartslag"],
          correctIndex: 1,
          explain: "Hyperventilatie verlaagt CO₂ in het bloed en kan duizeligheid/tintelingen veroorzaken."
        },
        {
          q: "Waardoor vermindert nachtzicht het meest?",
          options: ["Sterke witte cockpitverlichting", "Koele buitentemperatuur", "Lage luchtdruk", "Hoge luchtvochtigheid"],
          correctIndex: 0,
          explain: "Wit licht verblindt de staafjes in het oog; rood licht is vaak beter om nachtzicht te bewaren."
        },
        {
          q: "Wat is een belangrijk risico van uitdroging tijdens het vliegen?",
          options: ["Betere concentratie", "Snellere reactietijd", "Verminderde cognitieve prestaties", "Lagere kans op misselijkheid"],
          correctIndex: 2
        },
        {
          q: "Wat is een symptoom dat kan passen bij hypoxie?",
          options: ["Euforie of ongewoon gedrag", "Meer pijngevoel", "Verbeterd oordeel", "Altijd duidelijke benauwdheid als eerste teken"],
          correctIndex: 0,
          explain: "Hypoxie kan sluipend zijn: euforie/verminderd oordeel komen vaak voor."
        },
        {
          q: "Welke factor verhoogt de kans op motion sickness?",
          options: ["Stabiele horizonreferentie", "Kijken naar buiten", "Snelle hoofdbewegingen in turbulentie", "Goed geventileerde cockpit"],
          correctIndex: 2
        },
        {
          q: "Wat is het beste onmiddellijke tegenmiddel bij beginnende desoriëntatie?",
          options: ["Meer naar binnen kijken (instrumenten vermijden)", "Op de visuele horizon focussen en rustig vliegen", "Sneller draaien om ‘gevoel’ terug te krijgen", "Ogen sluiten tot het voorbij is"],
          correctIndex: 1
        }
      ],

      "Reglementering": [
        {
          q: "Wat is het hoofddoel van luchtruimclassificatie (A t/m G)?",
          options: ["Brandstofplanning", "Scheiding en verkeersregels voor verschillende gebruikers", "Navigatiekaarten updaten", "Weerrapporten standaardiseren"],
          correctIndex: 1
        },
        {
          q: "Wat betekent een NOTAM in essentie?",
          options: ["Een permanente wijziging in wetgeving", "Een bericht met tijdelijke/actuele operationele info voor luchtvarenden", "Een weerwaarschuwing uitsluitend voor IFR", "Een onderhoudslogboek van het vliegtuig"],
          correctIndex: 1
        },
        {
          q: "VFR-minima gaan onder andere over…",
          options: ["Wolkafstand en zicht", "Motorvermogen en brandstof", "Gewicht en balans", "Transpondercodes"],
          correctIndex: 0
        },
        {
          q: "Wat is ‘right-of-way’ (voorrang) vooral bedoeld om te garanderen?",
          options: ["Dat de snelste altijd eerst gaat", "Dat het sterkste toestel voorrang krijgt", "Botsingsrisico verminderen door voorspelbare regels", "Dat iedereen dezelfde hoogte vliegt"],
          correctIndex: 2
        },
        {
          q: "Wanneer is het nuttig om AIP te raadplegen?",
          options: ["Alleen bij noodsituaties", "Voor officiële procedures/gegevens van luchthavens en luchtruim", "Voor motoronderhoud", "Voor brandstofprijzen"],
          correctIndex: 1
        },
        {
          q: "Wat is de meest correcte houding bij twijfel over een regel/procedure?",
          options: ["Gokken, want het is toch VFR", "Beter even checken (AIP/NOTAM/instructeur) vóór de vlucht", "Pas na de vlucht opzoeken", "Altijd laag blijven vliegen"],
          correctIndex: 1
        }
      ],

      "Meteo": [
        {
          q: "Wat is een typische indicatie van cumulonimbus (CB) ontwikkeling?",
          options: ["Stabiele lucht met inversie", "Onstabiele lucht, sterke stijgstromen en mogelijk onweersbuien", "Altijd rustige wind", "Altijd uitstekende zichtbaarheid"],
          correctIndex: 1
        },
        {
          q: "Wat betekent ‘QNH’?",
          options: ["Druk herleid naar zeeniveau voor hoogte-instelling", "Druk op veldniveau voor taxi", "Temperatuurcorrectie voor hoogtemeter", "Windcorrectie voor koers"],
          correctIndex: 0
        },
        {
          q: "Frontpassage met warmfront geeft vaak…",
          options: ["Snelle opklaringen en dalende temperatuur", "Gelaagde bewolking en langdurige neerslag", "Onweer met hagel als standaard", "Altijd windstilte"],
          correctIndex: 1
        },
        {
          q: "Wat is ‘wind shear’?",
          options: ["Langzame verandering van druk", "Sterke verandering van windrichting/snelheid over korte afstand", "Een type wolk", "Een regenbui op radar"],
          correctIndex: 1
        },
        {
          q: "Wat gebeurt er meestal met het dauwpunt wanneer de lucht vochtiger wordt (bij gelijke temperatuur)?",
          options: ["Het dauwpunt stijgt", "Het dauwpunt daalt", "Het dauwpunt blijft altijd 0°C", "Het dauwpunt wordt irrelevant"],
          correctIndex: 0
        },
        {
          q: "Wat is een vaak voorkomend risico bij mist/laag stratus?",
          options: ["Te hoge density altitude", "Zicht- en plafondbeperking → VFR-onmogelijk", "Te sterke thermiek", "Altijd CB’s"],
          correctIndex: 1
        }
      ],

      "Radiocommunicatie": [
        {
          q: "Wat is het doel van een ‘readback’?",
          options: ["Tijd winnen op de radio", "Bevestigen dat je de instructie correct begrepen hebt", "Andere piloten afschrikken", "Frequentie vrijhouden"],
          correctIndex: 1
        },
        {
          q: "Wanneer gebruik je ‘PAN PAN’?",
          options: ["Bij onmiddellijke levensbedreiging", "Bij urgentie die hulp vereist maar niet direct levensbedreigend is", "Alleen voor medische noodgevallen op de grond", "Voor routinepositieberichten"],
          correctIndex: 1
        },
        {
          q: "Wat is ‘MAYDAY’?",
          options: ["Een routine oproep", "Een noodoproep bij ernstig en onmiddellijk gevaar", "Een verzoek om weerinformatie", "Een taxi-instructie"],
          correctIndex: 1
        },
        {
          q: "Wat is een goede praktijk als je een frequentie binnenkomt?",
          options: ["Onmiddellijk doorpraten", "Eerst luisteren (situational awareness) en dan kort en duidelijk zenden", "Altijd eerst je hele vluchtplan doorgeven", "Nooit je callsign zeggen"],
          correctIndex: 1
        },
        {
          q: "Wat hoort altijd duidelijk te zijn in een standaard oproep?",
          options: ["Je schoenmaat", "Callsign en bedoeling/positie (context)", "Je volledige logbook", "Alleen je voornaam"],
          correctIndex: 1
        },
        {
          q: "Wat doe je als je een instructie niet begrijpt?",
          options: ["Bevestigen alsof je het begreep", "‘Say again’ of verduidelijking vragen", "Frequentie wisselen zonder te melden", "Stil blijven"],
          correctIndex: 1
        }
      ]
    };

    /*************************************************************
     * 2) UTILITIES (shuffle, sample without replacement)
     *************************************************************/
    function mulberry32(seed) {
      return function() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function shuffle(arr, rng=Math.random) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function sample(arr, n, rng=Math.random) {
      const a = arr.slice();
      const out = [];
      n = Math.min(n, a.length);
      for (let i = 0; i < n; i++) {
        const idx = Math.floor(rng() * a.length);
        out.push(a.splice(idx, 1)[0]);
      }
      return out;
    }

    /*************************************************************
     * 3) APP STATE
     *************************************************************/
    const subjectEl = document.getElementById("subject");
    const numQuestionsEl = document.getElementById("numQuestions");
    const seedModeEl = document.getElementById("seedMode");
    const startBtn = document.getElementById("startBtn");
    const submitBtn = document.getElementById("submitBtn");
    const newSetBtn = document.getElementById("newSetBtn");
    const resetBtn = document.getElementById("resetBtn");
    const quizArea = document.getElementById("quizArea");
    const resultArea = document.getElementById("resultArea");
    const quizActions = document.getElementById("quizActions");
    const bankInfo = document.getElementById("bankInfo");

    let currentSubject = null;
    let currentQuestions = [];
    let sessionSeed = null;

    function initSubjects() {
      subjectEl.innerHTML = "";
      Object.keys(questionBanks).forEach(s => {
        const opt = document.createElement("option");
        opt.value = s;
        opt.textContent = s;
        subjectEl.appendChild(opt);
      });
      updateBankInfo();
    }

    function updateBankInfo() {
      const subj = subjectEl.value;
      const count = questionBanks[subj]?.length ?? 0;
      bankInfo.textContent = `Vragenbank: ${count} vragen beschikbaar`;
    }

    subjectEl.addEventListener("change", updateBankInfo);

    /*************************************************************
     * 4) QUIZ RENDERING
     *************************************************************/
    function startQuiz({ sameSubjectNewSet = false } = {}) {
      resultArea.style.display = "none";
      resultArea.innerHTML = "";
      quizArea.innerHTML = "";

      currentSubject = subjectEl.value;
      const bank = questionBanks[currentSubject] || [];
      const requestedN = parseInt(numQuestionsEl.value, 10) || 20;

      // RNG: elke sessie anders, of herhaalbaar
      if (!sameSubjectNewSet || sessionSeed == null) {
        sessionSeed = (seedModeEl.value === "false") ? 123456789 : Math.floor(Math.random() * 1e9);
      }
      const rng = mulberry32(sessionSeed);

      // Selecteer N willekeurige vragen
      const picked = sample(bank, requestedN, rng);

      // Shuffle vragen + shuffle antwoordopties per vraag (met correctIndex mapping)
      currentQuestions = shuffle(picked, rng).map((q, qi) => {
        const indices = q.options.map((_, i) => i);
        const shufIdx = shuffle(indices, rng);

        const newOptions = shufIdx.map(i => q.options[i]);
        const newCorrectIndex = shufIdx.indexOf(q.correctIndex);

        return {
          id: `${currentSubject}-${qi}-${Math.floor(rng()*1e9)}`,
          q: q.q,
          options: newOptions,
          correctIndex: newCorrectIndex,
          explain: q.explain || null
        };
      });

      renderQuestions();
      quizArea.style.display = "block";
      quizActions.style.display = "flex";
    }

    function renderQuestions() {
      const total = currentQuestions.length;

      const header = document.createElement("div");
      header.className = "meta";
      header.innerHTML = `
        <div class="pill"><b>${currentSubject}</b></div>
        <div class="pill">Vragen: <b>${total}</b></div>
        <div class="pill tag">Sessieseed: ${sessionSeed}</div>
      `;
      quizArea.appendChild(header);

      currentQuestions.forEach((q, idx) => {
        const qc = document.createElement("div");
        qc.className = "qcard";

        qc.innerHTML = `
          <div class="qhead">
            <div class="qtitle">Vraag ${idx + 1} / ${total}</div>
            <div class="tag">Meerkeuze (1 antwoord)</div>
          </div>
          <div class="qtext">${escapeHtml(q.q)}</div>
          <div class="answers" id="answers-${q.id}"></div>
        `;

        const ansWrap = qc.querySelector(`#answers-${CSS.escape(q.id)}`);
        q.options.forEach((optText, oi) => {
          const a = document.createElement("label");
          a.className = "ans";
          a.innerHTML = `
            <input type="radio" name="q-${q.id}" value="${oi}" />
            <div>${escapeHtml(optText)}</div>
          `;
          ansWrap.appendChild(a);
        });

        quizArea.appendChild(qc);
      });
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /*************************************************************
     * 5) SCORING
     *************************************************************/
    function gradeQuiz() {
      let correct = 0;
      let answered = 0;

      const breakdown = currentQuestions.map((q) => {
        const selected = document.querySelector(`input[name="q-${CSS.escape(q.id)}"]:checked`);
        const selectedIndex = selected ? parseInt(selected.value, 10) : null;
        const isCorrect = (selectedIndex !== null && selectedIndex === q.correctIndex);

        if (selectedIndex !== null) answered++;
        if (isCorrect) correct++;

        return { q, selectedIndex, isCorrect };
      });

      // Score op /10
      const total = currentQuestions.length || 1;
      const score10 = (correct / total) * 10;

      const passed = score10 >= 7.0;

      // UI output
      const pct = Math.round((correct / total) * 100);
      const scoreLine = `<div style="font-size:16px; font-weight:800;">
        Score: <span class="${passed ? "ok" : "bad"}">${score10.toFixed(1)}/10</span>
        <span class="small">(${correct}/${total} juist • ${pct}%)</span>
      </div>
      <div class="small">Beantwoord: ${answered}/${total}</div>
      <div style="margin-top:6px;" class="${passed ? "ok" : "bad"}">
        ${passed ? "✅ Geslaagd (≥ 7/10)" : "❌ Niet geslaagd (< 7/10)"}
      </div>`;

      // Toon per fout wat juist was
      let reviewHtml = `<details ${passed ? "" : "open"}><summary>Bekijk correcties</summary>`;
      breakdown.forEach((b, i) => {
        const q = b.q;
        const userText = (b.selectedIndex === null) ? "<i>geen antwoord</i>" : escapeHtml(q.options[b.selectedIndex]);
        const corrText = escapeHtml(q.options[q.correctIndex]);

        reviewHtml += `
          <div class="qcard" style="margin-top:10px;">
            <div class="qhead">
              <div class="qtitle">Vraag ${i + 1}</div>
              <div class="${b.isCorrect ? "ok" : "bad"}">${b.isCorrect ? "Juist" : "Fout"}</div>
            </div>
            <div class="qtext">${escapeHtml(q.q)}</div>
            <div class="small">Jouw antwoord: ${userText}</div>
            <div class="small">Juiste antwoord: <b>${corrText}</b></div>
            ${q.explain ? `<div class="explain">Uitleg: ${escapeHtml(q.explain)}</div>` : ""}
          </div>
        `;
      });
      reviewHtml += `</details>`;

      resultArea.innerHTML = scoreLine + `<div class="hr"></div>` + reviewHtml;
      resultArea.style.display = "block";

      // Scroll naar resultaat
      resultArea.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    /*************************************************************
     * 6) EVENTS
     *************************************************************/
    startBtn.addEventListener("click", () => startQuiz({ sameSubjectNewSet: false }));
    submitBtn.addEventListener("click", gradeQuiz);
    newSetBtn.addEventListener("click", () => startQuiz({ sameSubjectNewSet: true }));
    resetBtn.addEventListener("click", () => {
      quizArea.style.display = "none";
      quizActions.style.display = "none";
      resultArea.style.display = "none";
      quizArea.innerHTML = "";
      resultArea.innerHTML = "";
      currentQuestions = [];
      sessionSeed = null;
    });

    // init
    initSubjects();
  </script>
</body>
</html>
